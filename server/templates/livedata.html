<!DOCTYPE html>
<html>
<head>
    <title>Live data</title>
    <meta http-equiv="refresh" content="1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            margin-bottom: 40px;
        }
        input {
            display: block;
            width: 250px;
            margin: 10px auto;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            display: block;
            width: 150px;
            margin: 20px auto;
            padding: 12px;
            font-size: 16px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        a {
            display: block;
            margin-top: 15px;
            color: #007BFF;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>Live data</h1>
<h3>Pladser tilbage: {{ spots_left }}</h3>
<h3>Pladser taget: {{ spots_taken }}</h3>

</body>
</html>
